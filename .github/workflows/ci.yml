name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run unit tests
        run: python -m pytest

      - name: Run QA evaluation gate
        run: |
          python -m src.evals.harness \
            --corpus tests/data/eval/qa_corpus.json \
            --predictions tests/data/eval/qa_predictions.json \
            --report-path data/traces/eval_report.json \
            --assert-thresholds

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: data/traces/eval_report.json
