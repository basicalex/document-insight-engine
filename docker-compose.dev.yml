services:
  api:
    command:
      [
        "uvicorn",
        "src.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src",
        "--reload-dir",
        "/app/frontend",
      ]
    volumes:
      - ./src:/app/src
      - ./frontend:/app/frontend
      - ./data:/app/data

  ui:
    command:
      [
        "streamlit",
        "run",
        "frontend/app.py",
        "--server.address=0.0.0.0",
        "--server.port=8501",
        "--server.fileWatcherType=poll",
        "--browser.gatherUsageStats=false",
      ]
    volumes:
      - ./frontend:/app/frontend
      - ./src:/app/src
      - ./data:/app/data
